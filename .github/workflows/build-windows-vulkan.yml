name: Vulkan

on:
  workflow_dispatch:
    push:

    jobs:
      build:
          runs-on: windows-latest

              steps:
                    - name: Checkout
                            uses: actions/checkout@v4
                                    with:
                                              submodules: recursive

                                                    - name: Install Vulkan SDK
                                                            shell: powershell
                                                                    run: choco install vulkan-sdk -y

                                                                          - name: Configure
                                                                                  shell: powershell
                                                                                          run: cmake -B build -DGGML_VULKAN=1 -DCMAKE_BUILD_TYPE=Release

                                                                                                - name: Build
                                                                                                        shell: powershell
                                                                                                                run: cmake --build build --config Release -j 2

                                                                                                                      - name: Package
                                                                                                                              shell: powershell
                                                                                                                                      run: |
                                                                                                                                                New-Item -ItemType Directory -Force -Path package
                                                                                                                                                          Get-ChildItem -Path build -Recurse -Include *.exe,*.dll | Copy-Item -Destination package -Force
                                                                                                                                                                    Copy-Item LICENSE package\LICENSE.txt -Force
                                                                                                                                                                              Get-ChildItem package

                                                                                                                                                                                    - name: Upload
                                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                                    with:
                                                                                                                                                                                                              name: whisper-cpp-windows-vulkan
                                                                                                                                                                                                                        path: package