name: Build Windows Vulkan whisper.cpp

on:
  workflow_dispatch:

  jobs:
    build:
        runs-on: windows-latest

            steps:
                  - name: Checkout whisper.cpp
                          uses: actions/checkout@v4
                                  with:
                                            submodules: recursive

                                                  - name: Install Vulkan SDK
                                                          shell: pwsh
                                                                  run: |
                                                                            choco install vulkan-sdk -y

                                                                                  - name: Show Vulkan SDK
                                                                                          shell: pwsh
                                                                                                  run: |
                                                                                                            echo "VULKAN_SDK=$env:VULKAN_SDK"
                                                                                                                      if (-not $env:VULKAN_SDK) {
                                                                                                                                  throw "VULKAN_SDK environment variable not found"
                                                                                                                                            }

                                                                                                                                                  - name: Configure Vulkan build
                                                                                                                                                          shell: pwsh
                                                                                                                                                                  run: |
                                                                                                                                                                            cmake -B build -DGGML_VULKAN=1 -DCMAKE_BUILD_TYPE=Release

                                                                                                                                                                                  - name: Build Release
                                                                                                                                                                                          shell: pwsh
                                                                                                                                                                                                  run: |
                                                                                                                                                                                                            cmake --build build --config Release -j 2

                                                                                                                                                                                                                  - name: Collect backend files
                                                                                                                                                                                                                          shell: pwsh
                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                            New-Item -ItemType Directory -Force -Path package

                                                                                                                                                                                                                                                      Get-ChildItem -Path build -Recurse -Include *.exe,*.dll |
                                                                                                                                                                                                                                                                  Copy-Item -Destination package -Force

                                                                                                                                                                                                                                                                            Copy-Item LICENSE package/LICENSE.txt -Force

                                                                                                                                                                                                                                                                                      @"
                                                                                                                                                                                                                                                                                                Backend: whisper.cpp Windows Vulkan
                                                                                                                                                                                                                                                                                                          Source: https://github.com/ggml-org/whisper.cpp
                                                                                                                                                                                                                                                                                                                    Build flag: -DGGML_VULKAN=1

                                                                                                                                                                                                                                                                                                                              Recommended model:
                                                                                                                                                                                                                                                                                                                                        ggml-large-v3-turbo.bin

                                                                                                                                                                                                                                                                                                                                                  Model link:
                                                                                                                                                                                                                                                                                                                                                            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-large-v3-turbo.bin

                                                                                                                                                                                                                                                                                                                                                                      Test command:
                                                                                                                                                                                                                                                                                                                                                                                whisper-cli.exe -m models\ggml-large-v3-turbo.bin -f test.wav -l auto -oj -osrt
                                                                                                                                                                                                                                                                                                                                                                                          "@ | Out-File -FilePath package\BACKEND_INFO.txt -Encoding utf8

                                                                                                                                                                                                                                                                                                                                                                                                - name: Verify Vulkan DLL exists
                                                                                                                                                                                                                                                                                                                                                                                                        shell: pwsh
                                                                                                                                                                                                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                                                                                                                                                                                                          $vulkanDll = Get-ChildItem -Path package -Recurse -Filter "ggml-vulkan.dll" -ErrorAction SilentlyContinue
                                                                                                                                                                                                                                                                                                                                                                                                                                    if (-not $vulkanDll) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                Write-Host "Package contents:"
                                                                                                                                                                                                                                                                                                                                                                                                                                                            Get-ChildItem package
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        throw "ggml-vulkan.dll not found. Vulkan build may have failed."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: whisper-cpp-windows-vulkan
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: package